name: Build VisionVNC

on:
  push:
    branches: [main]
    paths:
      - 'VisionVNC.xcodeproj/**'
      - 'VisionVNC/**'
      - 'ci/**'
      - '.github/workflows/**'
  pull_request:
    branches: [main]
  workflow_dispatch:

# Pinned dependency versions
env:
  ROYALVNC_REF: '337197a'
  MOONLIGHT_COMMON_C_REF: '7b026e77be62175104640e7e722b758df6d3d0d7'
  OPUS_REF: '788cc89ce4f2c42025d8c70ec1b4457dc89cd50f'

jobs:
  build-and-release:
    runs-on: macos-26
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.3.app/Contents/Developer

      - name: Clone and patch RoyalVNC
        run: |
          git clone https://github.com/royalapplications/royalvnc.git repos/royalvnc
          cd repos/royalvnc
          git checkout $ROYALVNC_REF
          # Use static linking to avoid dyld embedding issues on visionOS
          sed -i '' 's/type: .dynamic/type: .static/' Package.swift

      - name: Clone and patch moonlight-common-c
        run: |
          git clone https://github.com/moonlight-stream/moonlight-common-c.git repos/moonlight-common-c
          cd repos/moonlight-common-c
          git checkout $MOONLIGHT_COMMON_C_REF
          # Add SPM Package.swift wrapper
          cp ../../ci/deps/moonlight-common-c/Package.swift .
          # Apply FEC recovery crash fixes for newer Sunshine versions
          git apply ../../ci/patches/moonlight-common-c-fec-fix.patch
          git apply ../../ci/patches/moonlight-common-c-audio-fec-fix.patch
          # Add CommonCrypto backend for AES-GCM/CBC (replaces OpenSSL on Apple platforms)
          git apply ../../ci/patches/moonlight-common-c-commoncrypto.patch

      - name: Clone and patch Opus
        run: |
          git clone https://github.com/xiph/opus.git repos/opus
          cd repos/opus
          git checkout $OPUS_REF
          # Add SPM Package.swift wrapper and config files
          cp ../../ci/deps/opus/Package.swift .
          mkdir -p spm-config
          cp ../../ci/deps/opus/spm-config/config.h spm-config/
          cp ../../ci/deps/opus/include/module.modulemap include/
          # Patch opus.h to include multistream API for SPM umbrella header
          git apply ../../ci/patches/opus-spm-umbrella.patch

      - name: Resolve packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project VisionVNC.xcodeproj \
            -scheme VisionVNC

      - name: Build archive
        run: |
          xcodebuild archive \
            -project VisionVNC.xcodeproj \
            -scheme VisionVNC \
            -destination 'generic/platform=visionOS' \
            -archivePath $RUNNER_TEMP/VisionVNC.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            SWIFT_ACTIVE_COMPILATION_CONDITIONS='$(inherited) MOONLIGHT_ENABLED'

      - name: Create unsigned IPA
        run: |
          cd $RUNNER_TEMP/VisionVNC.xcarchive/Products/Applications
          mkdir -p $RUNNER_TEMP/Payload
          cp -R VisionVNC.app $RUNNER_TEMP/Payload/
          cd $RUNNER_TEMP
          zip -r VisionVNC-unsigned.ipa Payload

      - name: Create a version string from git SHA
        id: version
        run: |
          VERSION="0.1.0-${GITHUB_SHA::8}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Rename IPA with version
        id: ipa
        run: |
          IPA_NAME="VisionVNC-${{ steps.version.outputs.version }}-unsigned.ipa"
          cp $RUNNER_TEMP/VisionVNC-unsigned.ipa "$IPA_NAME"
          echo "ipa_file=$IPA_NAME" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.version.outputs.version }}
          release_name: Latest Release
          draft: false
          prerelease: false

      - name: Upload Release Asset
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ${{ steps.ipa.outputs.ipa_file }}
          asset_name: ${{ steps.ipa.outputs.ipa_file }}
          asset_content_type: application/octet-stream
